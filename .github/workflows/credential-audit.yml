name: Credential audit

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  history:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node tools/check-secrets.mjs --history
