services:
  - type: web
    name: ratis-transmission-webapp-yjd1870
    runtime: node
    region: singapore
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: RATIS_MASTER_KEY
        sync: false
      - key: RATIS_AUTH_DB_PATH
        value: /var/data/auth-users.json
      - key: DATABASE_URL
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        sync: false
    disk:
      name: ratis-auth-data
      mountPath: /var/data
      sizeGB: 1
